services:
  postgres:
    image: postgres:15-alpine
    container_name: bcommerce-postgres
    environment:
      - POSTGRES_USER=bcommerce
      - POSTGRES_PASSWORD=bcommerce
      - POSTGRES_DB=bcommerce_db
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema removido - tabelas são criadas via EF Core Migrations
      # - ../docs/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bcommerce -d bcommerce_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
